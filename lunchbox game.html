<!DOCTYPE html>
<html>

<head>
<title>Lunchbox Classroom Game</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#f4f8ff;
}

h1{
color:#333;
}

.food-container{
margin:20px;
}

.food{
display:inline-block;
margin:10px;
padding:10px 16px;
border-radius:10px;
background:white;
border:2px solid #ddd;
font-size:22px;
cursor:pointer;
}

.food:hover{
background:#e8f5ff;
}

.lunchbox-area{
position:relative;
width:520px;
margin:auto;
}

.food-inside{
position:absolute;
top:95px;
left:70px;
width:380px;
min-height:120px;
}

.item{
font-size:42px;
margin:6px;
display:inline-block;
}

.counter{
font-size:22px;
margin-top:15px;
color:#333;
}

button{
font-size:18px;
padding:10px 20px;
margin:10px;
border:none;
border-radius:8px;
background:#4CAF50;
color:white;
cursor:pointer;
}

button:hover{
background:#45a049;
}

.mission{
font-size:20px;
color:#444;
margin:10px;
}

</style>
</head>

<body>

<h1>My Lunchbox Game</h1>

<div class="mission" id="mission"></div>

<div class="food-container">

<div class="food" onclick="addFood('sandwich','🥪')">🥪 Sandwich</div>
<div class="food" onclick="addFood('banana','🍌')">🍌 Banana</div>
<div class="food" onclick="addFood('pear','🍐')">🍐 Pear</div>
<div class="food" onclick="addFood('cookie','🍪')">🍪 Cookie</div>
<div class="food" onclick="addFood('drink','🧃')">🧃 Drink</div>

</div>

<div class="lunchbox-area">

<svg width="520" height="260">

<rect x="40" y="60" width="440" height="170" rx="25" fill="#FFD966" stroke="#CC9900" stroke-width="4"/>
<rect x="80" y="20" width="360" height="60" rx="20" fill="#FFE699" stroke="#CC9900" stroke-width="4"/>
<rect x="210" y="5" width="100" height="25" rx="10" fill="#FFCC66" stroke="#CC9900" stroke-width="3"/>

</svg>

<div id="lunchbox" class="food-inside"></div>

</div>

<div class="counter" id="sentence"></div>

<button onclick="resetBox()">Reset</button>
<button onclick="randomMission()">Random Mission</button>

<script>

let counts = {
sandwich:0,
banana:0,
pear:0,
cookie:0,
drink:0
}

function addFood(name,icon){

let lunchbox=document.getElementById("lunchbox")

let item=document.createElement("span")
item.className="item"
item.innerHTML=icon

lunchbox.appendChild(item)

counts[name]++

updateSentence()

}

function updateSentence(){

let text="I have "

let parts=[]

for(let key in counts){

if(counts[key]>0){

let word = key + (counts[key]>1?"s":"")

parts.push(counts[key]+" "+word)

}

}

if(parts.length==0){

document.getElementById("sentence").innerText=""

return

}

document.getElementById("sentence").innerText=text+parts.join(" and ")

}

function resetBox(){

document.getElementById("lunchbox").innerHTML=""

counts={
sandwich:0,
banana:0,
pear:0,
cookie:0,
drink:0
}

document.getElementById("sentence").innerText=""
document.getElementById("mission").innerText=""

}

function randomMission(){

let foods=["sandwich","banana","pear","cookie","drink"]

let food=foods[Math.floor(Math.random()*foods.length)]

let number=Math.floor(Math.random()*5)+1

document.getElementById("mission").innerText=
"Mission: Put "+number+" "+food+(number>1?"s":"")+" in the lunchbox!"

}

</script>

</body>
</html>
